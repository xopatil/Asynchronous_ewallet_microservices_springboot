# Name of this service ? it will appear with this name in Eureka dashboard
spring.application.name=api-gateway

# Gateway runs on port 8080 ? this is the ONLY port your client (Postman) talks to.
# All requests come here first.
server.port=8080

# ---- Eureka Connection ----
# Tell the Gateway where Eureka Server is running
# so it can register itself and look up other services.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Should the gateway register itself in Eureka? 
# YES ? so other services know the gateway exists (and for monitoring).
eureka.client.register-with-eureka=true

# Should it fetch the list of all registered services?
# YES ? it needs this list to know where to route requests.
eureka.client.fetch-registry=true

# ---- Gateway Routing ----
# This is the core of the gateway. You define routes here.
# Each route has:
#   id     = a nickname for this route (anything you want)
#   uri    = WHERE to send the request ("lb://" means "look up in Eureka by service name")
#   predicates = WHEN to apply this route (what URL pattern triggers it)

# Route 1: User Service
# Any request coming to /users/** will be forwarded to user-service
# Example: GET http://localhost:8080/users/register 
#       ? goes to ? http://localhost:8081/users/register
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**

# Route 2: Wallet Service  
# Any request to /wallet/** ? forwarded to wallet-service at port 8082
spring.cloud.gateway.routes[1].id=wallet-service
spring.cloud.gateway.routes[1].uri=lb://wallet-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/wallet/**

# Route 3: Transaction Service
# Any request to /transactions/** ? forwarded to transaction-service at port 8083
spring.cloud.gateway.routes[2].id=transaction-service
spring.cloud.gateway.routes[2].uri=lb://transaction-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/transactions/**

# ---- Load Balancer ----
# This enables the "lb://" prefix to work.
# Without this, Spring doesn't know how to resolve service names from Eureka.
spring.cloud.loadbalancer.ribbon.enabled=false

# ---- Logging ----
# DEBUG level for the gateway so you can see exactly what routing decisions are made.
# Very useful for debugging ? you'll see "Route matched: user-service" in logs.
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=INFO

# ---- Actuator (Health monitoring) ----
# Actuator gives you endpoints to check if your service is healthy.
# /actuator/health ? shows if the service is UP or DOWN
# /actuator/info   ? shows app info
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always

# JWT secret ? must be IDENTICAL to user-service jwt.secret
# Gateway uses this to validate tokens without calling User Service
jwt.secret=sterlingEwalletSuperSecretKey2024VeryLongSecretForSecurity

# These paths are PUBLIC ? no token needed
# Gateway will let these through without checking token
gateway.public-paths=/users/register,/users/login,/actuator

