# Service name ? must match what Gateway routes say (lb://user-service)
spring.application.name=user-service

# This service runs on port 8081
server.port=8082

# ---- H2 In-Memory Database Config ----
# datasource = the connection to your database
# url: "jdbc:h2:mem:userdb" means create an in-memory DB named "userdb"
# No files created on disk ? lives in RAM only
spring.datasource.url=jdbc:h2:mem:userdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---- JPA / Hibernate Config ----
# ddl-auto=create-drop means:
#   - On startup  ? Hibernate reads your @Entity classes and CREATES tables
#   - On shutdown ? Hibernate DROPS (deletes) those tables
# This is perfect for development. Change to "update" if you want data to persist between restarts.
spring.jpa.hibernate.ddl-auto=create-drop

# show-sql=true means every SQL query Hibernate runs will be printed in your console.
# Very useful for debugging ? you'll see exactly what's hitting the database.
spring.jpa.show-sql=true

# This makes the printed SQL readable with indentation
spring.jpa.properties.hibernate.format_sql=true

# Tell Hibernate we're using H2 database so it generates correct SQL syntax
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ---- H2 Web Console ----
# Lets you open a browser and visually inspect your database
# Go to http://localhost:8081/h2-console after starting the service
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- Eureka ----
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ---- JWT Secret Key ----
# This is the secret used to SIGN your JWT tokens.
# Think of it like a stamp ? only someone with this secret can create valid tokens.
# Must be at least 256 bits (32 characters) for the HS256 algorithm.
# In production, NEVER hardcode this ? use environment variables.
jwt.secret=sterlingEwalletSuperSecretKey2024VeryLongSecretForSecurity

# Token validity in milliseconds. 
# 86400000 ms = 24 hours. After this, the token expires and user must log in again.
jwt.expiration=86400000

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always